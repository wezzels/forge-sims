      - "5042:8080"
    restart: unless-stopped

  bmd-sim-slcm:
    build: ../bmd-sim-slcm
    container_name: bmd-sim-slcm
    ports:
      - "5043:8080"
    restart: unless-stopped

  # === Countermeasures ===
  bmd-sim-decoy:
    build: ../bmd-sim-decoy
    container_name: bmd-sim-decoy
    ports:
      - "5050:8080"
    restart: unless-stopped

  bmd-sim-jamming:
    build: ../bmd-sim-jamming
    container_name: bmd-sim-jamming
    ports:
      - "5051:8080"
    restart: unless-stopped

  # === C2 / Battle Management ===
  bmd-sim-c2bmc:
    build: ../bmd-sim-c2bmc
    container_name: bmd-sim-c2bmc
