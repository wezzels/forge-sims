version: "3.8"

# FORGE-Sims Docker Compose - All 25 BMDS Simulators
# Usage: docker-compose up -d

services:
  # === Core ===
  bmd-sim-core:
    build: ../bmd-sim-core
    container_name: bmd-sim-core
    restart: unless-stopped

  # === Space-Based Sensors ===
  bmd-sim-sbirs:
    build: ../bmd-sim-sbirs
    container_name: bmd-sim-sbirs
    ports:
      - "5010:8080"
    restart: unless-stopped

  bmd-sim-stss:
    build: ../bmd-sim-stss
    container_name: bmd-sim-stss
    ports:
      - "5011:8080"
    restart: unless-stopped

  bmd-sim-dsp:
    build: ../bmd-sim-dsp
    container_name: bmd-sim-dsp
    ports:
      - "5012:8080"
    restart: unless-stopped

  # === Radar Systems ===
  bmd-sim-uewr:
    build: ../bmd-sim-uewr
    container_name: bmd-sim-uewr
    ports:
      - "5020:8080"
    restart: unless-stopped

  bmd-sim-lrdr:
    build: ../bmd-sim-lrdr
    container_name: bmd-sim-lrdr
    ports:
      - "5021:8080"
    restart: unless-stopped

  bmd-sim-cobra-judy:
    build: ../bmd-sim-cobra-judy
    container_name: bmd-sim-cobra-judy
    ports:
      - "5022:8080"
    restart: unless-stopped

  # === Interceptors ===
  bmd-sim-gmd:
    build: ../bmd-sim-gmd
    container_name: bmd-sim-gmd
    ports:
      - "5030:8080"
    restart: unless-stopped

  bmd-sim-sm3:
    build: ../bmd-sim-sm3
    container_name: bmd-sim-sm3
    ports:
      - "5031:8080"
    restart: unless-stopped

  bmd-sim-sm6:
    build: ../bmd-sim-sm6
    container_name: bmd-sim-sm6
    ports:
      - "5032:8080"
